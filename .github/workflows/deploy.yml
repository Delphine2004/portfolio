name: Deploy static site

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement sur GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publication
        uses: actions/deploy-pages@v4
